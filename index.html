<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mixtape — Per-Track Repeat &amp; Speed</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1816">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mixtape">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg:#1a1816;
    --panel:#221f1c;
    --panel2:#2a2621;
    --amber:#e8a33d;
    --teal:#4a8c8c;
    --cream:#f2ede4;
    --red:#c1443c;
    --line:#3a352f;
    --muted:#9a9186;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--cream);
    font-family:'Space Grotesk', sans-serif;
    display:flex; justify-content:center;
    min-height:100vh; padding:24px 16px 50px;
  }
  .app{ width:100%; max-width:440px; }

  .eyebrow{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:2px;
    color:var(--teal); text-transform:uppercase; margin-bottom:4px;
  }
  h1{ font-size:26px; font-weight:700; margin:0 0 18px; letter-spacing:-0.5px; }

  /* ---- Deck (now playing) ---- */
  .deck{
    background:var(--panel); border:1px solid var(--line); border-radius:18px;
    padding:20px; position:relative; overflow:hidden; margin-bottom:22px;
  }
  .deck::before{
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
    background:linear-gradient(90deg, var(--amber), var(--red), var(--teal)); opacity:0.85;
  }
  .reels{ display:flex; justify-content:space-between; align-items:center; padding:6px 26px 18px; }
  .reel{
    width:56px; height:56px; border-radius:50%;
    background:
      radial-gradient(circle at center, var(--bg) 0 9px, transparent 9px),
      repeating-conic-gradient(var(--line) 0deg 8deg, var(--bg) 8deg 20deg);
    border:2px solid var(--line); position:relative;
  }
  .reel::after{
    content:''; position:absolute; top:50%; left:50%; width:9px; height:9px; border-radius:50%;
    background:var(--amber); transform:translate(-50%,-50%);
  }
  .reel.spin{ animation: spin 2.2s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .tape-window{ flex:1; height:2px; margin:0 12px; background:repeating-linear-gradient(90deg, var(--line) 0 4px, transparent 4px 8px); }

  .track-title{ font-size:18px; font-weight:700; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .play-status{
    font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--amber);
    text-align:center; margin:2px 0 16px; letter-spacing:0.5px;
  }

  .seek-row{ display:flex; align-items:center; gap:10px; font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--muted); margin-bottom:16px; }
  input[type=range]{ -webkit-appearance:none; appearance:none; flex:1; height:4px; border-radius:2px; background:var(--line); outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--amber); cursor:pointer; box-shadow:0 0 0 4px rgba(232,163,61,0.15); }
  input[type=range]::-moz-range-thumb{ width:14px; height:14px; border-radius:50%; background:var(--amber); border:none; cursor:pointer; }

  .controls{ display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:16px; }
  .btn{ background:none; border:none; color:var(--cream); cursor:pointer; padding:8px; display:flex; align-items:center; justify-content:center; }
  .btn svg{ width:20px; height:20px; }
  .btn-play{ width:54px; height:54px; border-radius:50%; background:var(--amber); color:var(--bg); }
  .btn-play svg{ width:24px; height:24px; }
  .btn:active{ opacity:0.6; }

  /* live repeat control */
  .repeat-live{
    border-top:1px solid var(--line); padding-top:14px; margin-top:2px;
  }
  .repeat-live-label{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--muted);
    text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; text-align:center;
  }
  .speed-row{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .speed-chip{
    font-family:'JetBrains Mono', monospace; font-size:12px;
    background:var(--panel2); border:1px solid var(--line); color:var(--cream);
    padding:8px 12px; border-radius:20px; cursor:pointer;
  }
  .speed-chip:active{ background:var(--line); }
  .speed-chip.disabled{ opacity:0.35; pointer-events:none; }

  .load-zone{ margin-top:16px; }
  .load-btn{
    display:block; width:100%; background:var(--bg); border:1px dashed var(--line);
    border-radius:12px; padding:13px; text-align:center;
    font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:1px;
    color:var(--teal); cursor:pointer; text-transform:uppercase;
  }
  input[type=file]{ display:none; }

  .playlist-io-row{ display:flex; gap:8px; margin-top:8px; }
  .playlist-io-btn{
    flex:1; background:transparent; border:1px solid var(--line);
    border-radius:10px; padding:10px; text-align:center;
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.5px;
    color:var(--muted); cursor:pointer;
  }
  .playlist-io-btn:active{ background:var(--panel2); }

  .saved-list-item{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 12px; border:1px solid var(--line); border-radius:10px;
    margin-bottom:8px; cursor:pointer;
  }
  .saved-list-item:active{ background:var(--panel2); }
  .saved-list-name{ font-weight:700; font-size:14px; }
  .saved-list-meta{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--muted); margin-top:2px;
  }
  .saved-list-delete{
    background:none; border:none; color:var(--red); cursor:pointer;
    font-size:15px; padding:4px 6px; flex-shrink:0;
  }
  .saved-list-empty{ text-align:center; color:var(--muted); font-size:13px; padding:14px 6px; }

  .jamendo-search-row{ display:flex; gap:8px; margin-bottom:12px; }
  .jamendo-search-input{
    flex:1; background:var(--bg); border:1px solid var(--line); border-radius:8px;
    padding:9px 10px; color:var(--cream); font-family:'JetBrains Mono', monospace; font-size:13px;
  }
  .jamendo-search-btn{
    background:var(--amber); border:none; color:var(--bg); font-weight:700;
    padding:9px 16px; border-radius:8px; cursor:pointer; font-family:'JetBrains Mono', monospace;
  }
  .jamendo-results{ max-height:320px; overflow-y:auto; }
  .jamendo-result-left{ display:flex; align-items:center; gap:10px; min-width:0; }
  .jamendo-result-thumb{
    width:38px; height:38px; border-radius:7px; object-fit:cover; flex-shrink:0; background:var(--panel2);
  }
  .jamendo-add-btn{
    flex-shrink:0; background:transparent; border:1px solid var(--line); color:var(--muted);
    padding:6px 12px; border-radius:8px; cursor:pointer; font-family:'JetBrains Mono', monospace; font-size:11px;
  }
  .jamendo-add-btn:active{ background:var(--amber); border-color:var(--amber); color:var(--bg); }
  .jamendo-add-btn:disabled{ opacity:0.5; }

  /* ---- Playlist ---- */
  .playlist-label{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:2px;
    color:var(--muted); text-transform:uppercase; margin-bottom:10px;
  }
  .playlist-header{
    display:flex; align-items:center; justify-content:space-between;
  }
  .playlist-header .playlist-label{ margin-bottom:10px; }
  .playlist-header-actions{ display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .loop-toggle-btn{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.5px;
    background:none; border:1px solid var(--line); color:var(--muted);
    padding:5px 10px; border-radius:8px; cursor:pointer;
  }
  .loop-toggle-btn.on{ background:var(--teal); border-color:var(--teal); color:var(--bg); font-weight:700; }
  .mix-btn{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.5px;
    background:none; border:1px solid var(--line); color:var(--muted);
    padding:5px 10px; border-radius:8px; cursor:pointer;
  }
  .mix-btn:active{ background:var(--amber); border-color:var(--amber); color:var(--bg); }
  .clear-all-btn{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.5px;
    background:none; border:1px solid var(--line); color:var(--red);
    padding:5px 10px; border-radius:8px; cursor:pointer; margin-bottom:10px;
  }
  .clear-all-btn:active{ background:var(--red); color:var(--cream); }
  .track-item{ border-radius:12px; margin-bottom:6px; overflow:hidden; background:transparent; }
  .track-item.active{ background:var(--panel); }
  .track-row{ display:flex; align-items:center; gap:10px; padding:12px 10px; cursor:pointer; }
  .track-num{ font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--muted); width:20px; flex-shrink:0; }
  .track-item.active .track-num{ color:var(--amber); }
  .track-name{ flex:1; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .repeat-badge{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--bg);
    background:var(--teal); padding:2px 7px; border-radius:10px; flex-shrink:0;
  }
  .chevron{ width:14px; height:14px; color:var(--muted); flex-shrink:0; transition:transform 0.15s; }
  .chevron.open{ transform:rotate(180deg); }

  .track-detail{ padding:0 10px 14px 40px; display:none; }
  .track-detail.open{ display:block; }
  .play-chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
  .play-chip{
    display:flex; align-items:center; gap:6px;
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    padding:6px 8px 6px 10px; font-family:'JetBrains Mono', monospace; font-size:12px;
  }
  .play-chip .rm{ background:none; border:none; color:var(--red); cursor:pointer; font-size:14px; line-height:1; padding:2px; }
  .play-chip-label{
    background:none; border:none; color:var(--cream); font-family:'JetBrains Mono', monospace;
    font-size:12px; cursor:pointer; padding:0;
  }

  .edit-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:20px;
  }
  .edit-panel{
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:20px; width:100%; max-width:320px;
  }
  .edit-panel-title{
    font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:1px;
    color:var(--muted); text-transform:uppercase; margin-bottom:12px; text-align:center;
  }
  .edit-panel .chip-row{ justify-content:center; }
  .edit-panel-close{
    display:block; margin:16px auto 0; background:none; border:none;
    color:var(--muted); font-family:'JetBrains Mono', monospace; font-size:12px;
    text-decoration:underline; cursor:pointer;
  }
  .setup-label{
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:1px;
    color:var(--muted); text-transform:uppercase; margin:12px 0 6px;
  }
  .chip-row{ display:flex; gap:6px; flex-wrap:wrap; }
  .setup-chip{
    font-family:'JetBrains Mono', monospace; font-size:12px;
    background:transparent; border:1px solid var(--line); color:var(--muted);
    padding:6px 11px; border-radius:8px; cursor:pointer;
  }
  .setup-chip.sel{ background:var(--teal); border-color:var(--teal); color:var(--bg); font-weight:700; }
  .custom-count-input{
    width:60px; margin-left:2px;
    background:var(--bg); border:1px solid var(--line); border-radius:8px;
    color:var(--cream); font-family:'JetBrains Mono', monospace; font-size:12px;
    padding:6px 8px;
  }
  .add-repeat-btn{
    display:block; margin-top:10px; width:100%;
    font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.5px;
    background:var(--amber); border:none; color:var(--bg); font-weight:700;
    padding:9px; border-radius:8px; cursor:pointer;
  }
  .add-repeat-btn:active{ opacity:0.7; }

  .track-actions{ display:flex; align-items:center; gap:2px; flex-shrink:0; }
  .order-btns{ display:flex; flex-direction:column; }
  .order-btn{
    background:none; border:none; color:var(--muted); cursor:pointer;
    padding:1px 4px; line-height:1; font-size:10px;
  }
  .order-btn:disabled{ opacity:0.2; pointer-events:none; }
  .order-btn:active{ color:var(--amber); }
  .delete-btn{
    background:none; border:none; color:var(--red); cursor:pointer;
    padding:4px 6px; font-size:15px; line-height:1;
  }
  .delete-btn:active{ opacity:0.6; }

  .empty-state{ text-align:center; color:#7a7268; font-size:13px; padding:20px 10px; }

  .cover-wrap{
    width:190px; height:190px; margin:2px auto 18px;
    border-radius:14px; overflow:hidden; position:relative;
    border:2px solid var(--line);
    background:linear-gradient(135deg, var(--panel2), var(--bg));
    display:flex; align-items:center; justify-content:center;
  }
  .cover-wrap img{ width:100%; height:100%; object-fit:cover; display:block; }
  .cover-placeholder{ width:52px; height:52px; color:var(--line); }
  .cover-edit-btn{
    position:absolute; bottom:8px; right:8px;
    background:rgba(0,0,0,0.6); border:1px solid var(--line); color:var(--cream);
    border-radius:8px; padding:5px 8px; font-size:11px; cursor:pointer;
    font-family:'JetBrains Mono', monospace; letter-spacing:0.5px;
  }
  .cover-edit-btn:active{ opacity:0.6; }

  .track-thumb{
    width:30px; height:30px; border-radius:7px; object-fit:cover;
    flex-shrink:0; background:var(--panel2); border:1px solid var(--line);
  }
  .skip-badge{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--cream);
    background:var(--red); padding:2px 7px; border-radius:10px; flex-shrink:0;
  }
  .skip-toggle{
    display:block; width:100%; margin-top:10px;
    font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.5px;
    background:transparent; border:1px solid var(--line); color:var(--muted);
    padding:9px; border-radius:8px; cursor:pointer;
  }
  .skip-toggle.on{ background:var(--red); border-color:var(--red); color:var(--cream); font-weight:700; }
  .skip-toggle:active{ opacity:0.7; }

  /* ---- Deck style toggle ---- */
  .style-toggle{
    display:flex; gap:6px; justify-content:center; margin-bottom:16px;
  }
  .style-toggle-btn{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.5px;
    background:var(--panel2); border:1px solid var(--line); color:var(--muted);
    padding:7px 14px; border-radius:20px; cursor:pointer;
  }
  .style-toggle-btn.active{ background:var(--amber); border-color:var(--amber); color:var(--bg); font-weight:700; }

  .deck-visual{ display:none; }
  .deck-visual.active{ display:block; }

  /* ---- Turntable visual ---- */
  .platter{
    position:relative; width:220px; height:220px; margin:6px auto 20px;
    display:flex; align-items:center; justify-content:center;
  }
  .vinyl{
    width:210px; height:210px; border-radius:50%;
    background:
      repeating-radial-gradient(circle at center, #101010 0 3px, #1c1a18 3px 6px);
    border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 16px rgba(0,0,0,0.4);
  }
  .vinyl.spin{ animation: spin 2.4s linear infinite; }
  .vinyl-label{
    width:92px; height:92px; border-radius:50%;
    overflow:hidden; border:2px solid var(--amber);
    background:linear-gradient(135deg, var(--panel2), var(--bg));
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .vinyl-label img{ width:100%; height:100%; object-fit:cover; }
  .vinyl-label .cover-placeholder{ width:34px; height:34px; color:var(--line); }
  .vinyl-center-dot{
    position:absolute; width:10px; height:10px; border-radius:50%;
    background:var(--bg); border:1px solid var(--muted);
  }
  .tonearm{
    position:absolute; top:-6px; right:-2px;
    width:100px; height:100px;
    transform-origin: 90% 10%;
    transform: rotate(-28deg);
    transition: transform 0.5s ease;
    pointer-events:none;
  }
  .tonearm.playing{ transform: rotate(-6deg); }
  .tonearm-base{
    position:absolute; top:0; right:6px;
    width:16px; height:16px; border-radius:50%;
    background:var(--panel2); border:2px solid var(--amber);
  }
  .tonearm-arm{
    position:absolute; top:8px; right:12px;
    width:3px; height:78px; border-radius:2px;
    background:var(--amber);
    transform-origin: top center;
  }
  .tonearm-head{
    position:absolute; top:80px; right:5px;
    width:16px; height:10px; border-radius:3px;
    background:var(--amber);
  }
  .cover-edit-btn-tt{
    display:block; margin:0 auto 4px; width:fit-content;
    background:transparent; border:1px solid var(--line); color:var(--muted);
    padding:5px 10px; border-radius:8px; font-size:11px; cursor:pointer;
    font-family:'JetBrains Mono', monospace;
  }
  .cover-edit-btn-tt:active{ opacity:0.6; }
</style>
</head>
<body>
<div class="app">
  <h1>Mixtape</h1>

  <div class="deck">
    <div class="style-toggle">
      <button class="style-toggle-btn" id="styleCassetteBtn">📼 Cassette</button>
      <button class="style-toggle-btn" id="styleTurntableBtn">💿 Turntable</button>
    </div>

    <div class="deck-visual" id="cassetteVisual">
      <div class="reels">
        <div class="reel" id="reelLeft"></div>
        <div class="tape-window"></div>
        <div class="reel" id="reelRight"></div>
      </div>
      <div class="cover-wrap" id="coverWrap"></div>
    </div>

    <div class="deck-visual" id="turntableVisual">
      <div class="platter">
        <div class="vinyl" id="vinylDisc">
          <div class="vinyl-label" id="vinylLabel"></div>
          <div class="vinyl-center-dot"></div>
        </div>
        <div class="tonearm" id="tonearm">
          <div class="tonearm-base"></div>
          <div class="tonearm-arm"></div>
          <div class="tonearm-head"></div>
        </div>
      </div>
      <button class="cover-edit-btn-tt" id="coverEditBtnTt">✎ Cover</button>
    </div>

    <input type="file" id="coverInput" accept="image/*" style="display:none">

    <div class="track-title" id="trackTitle">No track loaded</div>
    <div class="play-status" id="playStatus">Load a file to begin</div>

    <div class="seek-row">
      <span id="curTime">0:00</span>
      <input type="range" id="seek" min="0" max="100" value="0">
      <span id="durTime">0:00</span>
    </div>

    <div class="controls">
      <button class="btn" id="prevBtn" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="btn btn-play" id="playBtn" aria-label="Play">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="btn" id="nextBtn" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6v12l8.5-6z"/></svg>
      </button>
    </div>

    <div class="repeat-live">
      <div class="repeat-live-label">Repeat this song, next play at:</div>
      <div class="speed-row" id="liveSpeedRow">
        <div class="speed-chip" data-speed="0.75">0.75×</div>
        <div class="speed-chip" data-speed="1">1×</div>
        <div class="speed-chip" data-speed="1.25">1.25×</div>
        <div class="speed-chip" data-speed="1.5">1.5×</div>
        <div class="speed-chip" data-speed="3">3×</div>
      </div>
    </div>

    <div class="load-zone">
      <label class="load-btn" for="fileInput">+ Add tracks</label>
      <input type="file" id="fileInput" accept="*/*" multiple>
      <div class="playlist-io-row">
        <button class="playlist-io-btn" id="savePlaylistBtn">💾 Save playlist</button>
        <button class="playlist-io-btn" id="loadPlaylistBtn">📂 Load playlist</button>
      </div>
      <div class="playlist-io-row">
        <button class="playlist-io-btn" id="browseJamendoBtn">🎧 Browse free music</button>
      </div>
    </div>
  </div>

  <div class="playlist-header">
    <div class="playlist-label">Tracklist</div>
    <div class="playlist-header-actions">
      <button class="loop-toggle-btn" id="loopToggleBtn">🔁 Loop</button>
      <button class="mix-btn" id="mixBtn">🔀 Mix</button>
      <button class="mix-btn" id="restoreBtn">↺ Restore</button>
      <button class="clear-all-btn" id="clearAllBtn">Clear all</button>
    </div>
  </div>
  <div id="playlistItems">
    <div class="empty-state">Your playlist is empty — add some audio files above.</div>
  </div>
</div>

<div id="editOverlayContainer"></div>

<audio id="audio"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
<script>
  const audio = document.getElementById('audio');
  const fileInput = document.getElementById('fileInput');
  const playlistEl = document.getElementById('playlistItems');
  const playBtn = document.getElementById('playBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const seek = document.getElementById('seek');
  const curTime = document.getElementById('curTime');
  const durTime = document.getElementById('durTime');
  const trackTitle = document.getElementById('trackTitle');
  const playStatus = document.getElementById('playStatus');
  const reelLeft = document.getElementById('reelLeft');
  const reelRight = document.getElementById('reelRight');
  const vinylDisc = document.getElementById('vinylDisc');
  const tonearm = document.getElementById('tonearm');
  const liveSpeedRow = document.getElementById('liveSpeedRow');

  const ICON_PLAY = '<path d="M8 5v14l11-7z"/>';
  const ICON_PAUSE = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  const SPEEDS = [0.75, 1, 1.25, 1.5, 3];

  // track: { id, name, url, plays:[{speed}] }
  let tracks = [];
  let currentTrackIndex = -1;
  let currentPlayIndex = 0;
  let isSeeking = false;
  let expandedTrackId = null;
  let idCounter = 0;

  function fmtTime(sec){
    if(!isFinite(sec)) return '0:00';
    const m = Math.floor(sec/60);
    const s = Math.floor(sec%60).toString().padStart(2,'0');
    return `${m}:${s}`;
  }

  function currentTrack(){ return tracks[currentTrackIndex]; }

  function renderPlaylist(){
    if(tracks.length === 0){
      playlistEl.innerHTML = '<div class="empty-state">Your playlist is empty — add some audio files above.</div>';
      return;
    }
    playlistEl.innerHTML = tracks.map((t,i) => {
      const isActive = i === currentTrackIndex;
      const isOpen = t.id === expandedTrackId;
      const badge = t.plays.length > 1 ? `<span class="repeat-badge">×${t.plays.length}</span>` : '';
      const skipBadge = t.skipOnce ? `<span class="skip-badge">SKIP</span>` : '';
      const chips = t.plays.map((p, pi) => `
        <div class="play-chip">
          <button class="play-chip-label" data-track="${t.id}" data-editplay="${pi}">${pi+1}: ${p.speed}×</button>
          ${t.plays.length > 1 ? `<button class="rm" data-track="${t.id}" data-play="${pi}">✕</button>` : ''}
        </div>
      `).join('');
      const speedChips = SPEEDS.map(s => `<button class="setup-chip ${t.pendingSpeed===s?'sel':''}" data-track="${t.id}" data-setspeed="${s}">${s}×</button>`).join('');
      const counts = [1,2,3];
      const countChips = counts.map(c => `<button class="setup-chip ${(!t.pendingCustomActive && t.pendingCount===c)?'sel':''}" data-track="${t.id}" data-setcount="${c}">${c}×</button>`).join('')
        + `<button class="setup-chip ${t.pendingCustomActive?'sel':''}" data-track="${t.id}" data-setcustom="1">Custom</button>`
        + (t.pendingCustomActive ? `<input type="number" class="custom-count-input" data-track="${t.id}" min="1" max="50" value="${t.pendingCustomValue}">` : '');
      const thumb = t.coverUrl
        ? `<img class="track-thumb" src="${t.coverUrl}" alt="">`
        : `<span class="track-thumb"></span>`;
      return `
        <div class="track-item ${isActive ? 'active':''}">
          <div class="track-row" data-track="${t.id}">
            <span class="track-num">${(i+1).toString().padStart(2,'0')}</span>
            ${thumb}
            <span class="track-name">${t.name}</span>
            ${badge}
            ${skipBadge}
            <div class="track-actions">
              <div class="order-btns">
                <button class="order-btn" data-move="${t.id}" data-dir="-1" ${i===0?'disabled':''}>▲</button>
                <button class="order-btn" data-move="${t.id}" data-dir="1" ${i===tracks.length-1?'disabled':''}>▼</button>
              </div>
              <button class="delete-btn" data-remove="${t.id}">✕</button>
            </div>
            <svg class="chevron ${isOpen?'open':''}" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
          </div>
          <div class="track-detail ${isOpen?'open':''}">
            <div class="play-chip-row">${chips}</div>
            <div class="setup-label">Speed</div>
            <div class="chip-row">${speedChips}</div>
            <div class="setup-label">Repeat count</div>
            <div class="chip-row">${countChips}</div>
            <button class="add-repeat-btn" data-addrepeat="${t.id}">+ Add to queue</button>
            <button class="skip-toggle ${t.skipOnce?'on':''}" data-toggleskip="${t.id}">${t.skipOnce ? '✓ Skipping next round through this playlist' : 'Skip this track once'}</button>
          </div>
        </div>
      `;
    }).join('');

    playlistEl.querySelectorAll('.track-row').forEach(el=>{
      el.addEventListener('click', ()=>{
        const id = el.dataset.track;
        expandedTrackId = expandedTrackId === id ? null : id;
        renderPlaylist();
      });
    });
    playlistEl.querySelectorAll('.track-name, .track-num').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        const id = el.closest('.track-row').dataset.track;
        const idx = tracks.findIndex(t=>t.id===id);
        loadTrack(idx, 0, true);
      });
    });
    playlistEl.querySelectorAll('.rm').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        const t = tracks.find(t=>t.id===el.dataset.track);
        const pi = parseInt(el.dataset.play);
        if(t.plays.length > 1){ t.plays.splice(pi,1); }
        renderPlaylist();
        updateStatus();
      });
    });
    playlistEl.querySelectorAll('[data-setspeed]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        const t = tracks.find(t=>t.id===el.dataset.track);
        t.pendingSpeed = parseFloat(el.dataset.setspeed);
        renderPlaylist();
      });
    });
    playlistEl.querySelectorAll('[data-setcount]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        const t = tracks.find(t=>t.id===el.dataset.track);
        t.pendingCount = parseInt(el.dataset.setcount);
        t.pendingCustomActive = false;
        renderPlaylist();
      });
    });
    playlistEl.querySelectorAll('[data-setcustom]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        const t = tracks.find(t=>t.id===el.dataset.track);
        t.pendingCustomActive = true;
        renderPlaylist();
      });
    });
    playlistEl.querySelectorAll('.custom-count-input').forEach(el=>{
      el.addEventListener('click', (e)=> e.stopPropagation());
      el.addEventListener('input', (e)=>{
        const t = tracks.find(t=>t.id===el.dataset.track);
        t.pendingCustomValue = Math.max(1, parseInt(el.value) || 1);
      });
    });
    playlistEl.querySelectorAll('[data-addrepeat]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        const t = tracks.find(t=>t.id===el.dataset.addrepeat);
        const count = t.pendingCustomActive ? t.pendingCustomValue : t.pendingCount;
        t.plays = Array.from({length: count}, () => ({ speed: t.pendingSpeed }));
        renderPlaylist();
        updateStatus();
      });
    });
    playlistEl.querySelectorAll('[data-move]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        moveTrack(el.dataset.move, parseInt(el.dataset.dir));
      });
    });
    playlistEl.querySelectorAll('[data-remove]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        removeTrack(el.dataset.remove);
      });
    });
    playlistEl.querySelectorAll('[data-editplay]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        openEditPopup(el.dataset.track, parseInt(el.dataset.editplay));
      });
    });
    playlistEl.querySelectorAll('[data-toggleskip]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        const t = tracks.find(t=>t.id===el.dataset.toggleskip);
        t.skipOnce = !t.skipOnce;
        renderPlaylist();
      });
    });
  }

  const editOverlayContainer = document.getElementById('editOverlayContainer');

  function openEditPopup(trackId, playIndex){
    const t = tracks.find(t=>t.id===trackId);
    if(!t) return;
    const current = t.plays[playIndex].speed;
    editOverlayContainer.innerHTML = `
      <div class="edit-overlay" id="editOverlayBackdrop">
        <div class="edit-panel">
          <div class="edit-panel-title">Play ${playIndex+1} speed</div>
          <div class="chip-row">
            ${SPEEDS.map(s => `<button class="setup-chip ${s===current?'sel':''}" data-editspeed="${s}">${s}×</button>`).join('')}
          </div>
          <button class="edit-panel-close" id="editPanelClose">Close</button>
        </div>
      </div>
    `;
    document.getElementById('editOverlayBackdrop').addEventListener('click', (e)=>{
      if(e.target.id === 'editOverlayBackdrop') closeEditPopup();
    });
    document.getElementById('editPanelClose').addEventListener('click', closeEditPopup);
    editOverlayContainer.querySelectorAll('[data-editspeed]').forEach(el=>{
      el.addEventListener('click', ()=>{
        t.plays[playIndex].speed = parseFloat(el.dataset.editspeed);
        closeEditPopup();
        renderPlaylist();
        if(tracks[currentTrackIndex] === t && currentPlayIndex === playIndex){
          audio.playbackRate = t.plays[playIndex].speed;
          updateStatus();
        }
      });
    });
  }

  function closeEditPopup(){
    editOverlayContainer.innerHTML = '';
  }

  function moveTrack(id, dir){
    const idx = tracks.findIndex(t=>t.id===id);
    const newIdx = idx + dir;
    if(idx === -1 || newIdx < 0 || newIdx >= tracks.length) return;
    const wasCurrent = currentTrackIndex === idx;
    const swappedWasCurrent = currentTrackIndex === newIdx;
    [tracks[idx], tracks[newIdx]] = [tracks[newIdx], tracks[idx]];
    if(wasCurrent) currentTrackIndex = newIdx;
    else if(swappedWasCurrent) currentTrackIndex = idx;
    renderPlaylist();
  }

  function removeTrack(id){
    const idx = tracks.findIndex(t=>t.id===id);
    if(idx === -1) return;
    const wasPlaying = currentTrackIndex === idx;
    if(expandedTrackId === id) expandedTrackId = null;
    tracks.splice(idx, 1);
    if(wasPlaying){
      audio.pause();
      audio.removeAttribute('src');
      currentTrackIndex = -1;
      currentPlayIndex = 0;
      trackTitle.textContent = 'No track loaded';
      seek.value = 0; curTime.textContent = '0:00'; durTime.textContent = '0:00';
      renderDeckCover();
    } else if(currentTrackIndex > idx){
      currentTrackIndex--;
    }
    updateStatus();
    renderPlaylist();
  }

  function loadTrack(index, playIndex, autoplay){
    if(index < 0 || index >= tracks.length) return;
    currentTrackIndex = index;
    currentPlayIndex = playIndex || 0;
    const t = tracks[index];
    audio.src = t.url;
    audio.playbackRate = t.plays[currentPlayIndex].speed;
    trackTitle.textContent = t.name;
    updateStatus();
    renderPlaylist();
    renderDeckCover();
    if(autoplay){ audio.play(); }
  }

  function renderDeckCover(){
    const t = currentTrack();
    const imgHtml = (t && t.coverUrl)
      ? `<img src="${t.coverUrl}" alt="cover art">`
      : `<svg class="cover-placeholder" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3z"/></svg>`;

    const wrap = document.getElementById('coverWrap');
    wrap.innerHTML = `${imgHtml}<button class="cover-edit-btn" id="coverEditBtn">✎ Cover</button>`;
    document.getElementById('coverEditBtn').addEventListener('click', ()=>{
      if(currentTrackIndex === -1) return;
      coverInput.click();
    });

    const label = document.getElementById('vinylLabel');
    label.innerHTML = imgHtml;
  }

  const coverInput = document.getElementById('coverInput');
  coverInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file || currentTrackIndex === -1) return;
    const t = currentTrack();
    t.coverUrl = URL.createObjectURL(file);
    renderDeckCover();
    renderPlaylist();
    coverInput.value = '';
  });

  document.getElementById('coverEditBtnTt').addEventListener('click', ()=>{
    if(currentTrackIndex === -1) return;
    coverInput.click();
  });

  // Deck style toggle — persists preference where storage is available
  const styleCassetteBtn = document.getElementById('styleCassetteBtn');
  const styleTurntableBtn = document.getElementById('styleTurntableBtn');
  const cassetteVisual = document.getElementById('cassetteVisual');
  const turntableVisual = document.getElementById('turntableVisual');

  function setDeckStyle(style){
    const isCassette = style !== 'turntable';
    cassetteVisual.classList.toggle('active', isCassette);
    turntableVisual.classList.toggle('active', !isCassette);
    styleCassetteBtn.classList.toggle('active', isCassette);
    styleTurntableBtn.classList.toggle('active', !isCassette);
    try{ localStorage.setItem('mixtape-deck-style', style); }catch(e){ /* storage unavailable, preference just won't persist */ }
  }

  styleCassetteBtn.addEventListener('click', ()=> setDeckStyle('cassette'));
  styleTurntableBtn.addEventListener('click', ()=> setDeckStyle('turntable'));

  let savedStyle = 'cassette';
  try{ savedStyle = localStorage.getItem('mixtape-deck-style') || 'cassette'; }catch(e){ /* default to cassette */ }
  setDeckStyle(savedStyle);

  function updateStatus(){
    const t = currentTrack();
    if(!t){ playStatus.textContent = 'Load a file to begin'; return; }
    const total = t.plays.length;
    const speed = t.plays[currentPlayIndex] ? t.plays[currentPlayIndex].speed : 1;
    playStatus.textContent = total > 1
      ? `Play ${currentPlayIndex+1} of ${total} · ${speed}×`
      : `${speed}×`;
  }

  fileInput.addEventListener('change', (e)=>{
    const files = Array.from(e.target.files);
    files.forEach(f=>{
      const seq = idCounter++;
      const newTrack = {
        id: 't' + seq,
        order: seq,
        name: f.name.replace(/\.[^/.]+$/, ''),
        url: URL.createObjectURL(f),
        plays: [{ speed: 1 }],
        pendingSpeed: 1,
        pendingCount: 1,
        pendingCustomActive: false,
        pendingCustomValue: 2,
        coverUrl: null,
        skipOnce: false,
        originalOrder: idCounter
      };
      tracks.push(newTrack);
      try{ extractCover(f, newTrack); }catch(err){ /* cover extraction failing should never block adding the song */ }
    });
    renderPlaylist();
    if(currentTrackIndex === -1 && tracks.length > 0){ loadTrack(0, 0, false); }
    fileInput.value = '';
  });

  function extractCover(file, track){
    if(typeof jsmediatags === 'undefined') return;
    try{
      jsmediatags.read(file, {
        onSuccess: function(tag){
          try{
            const pic = tag.tags.picture;
            if(!pic) return;
            let binary = '';
            for(let i=0; i<pic.data.length; i++){ binary += String.fromCharCode(pic.data[i]); }
            track.coverUrl = `data:${pic.format};base64,${window.btoa(binary)}`;
            if(currentTrack() === track) renderDeckCover();
            renderPlaylist();
          }catch(err){ /* malformed tag data — just skip the cover */ }
        },
        onError: function(){ /* no embedded art found — user can add one manually */ }
      });
    }catch(err){ /* library failed to run — song is already added regardless */ }
  }

  playBtn.addEventListener('click', ()=>{
    if(currentTrackIndex === -1) return;
    if(audio.paused){ audio.play(); } else { audio.pause(); }
  });

  audio.addEventListener('play', ()=>{
    document.getElementById('playIcon').outerHTML = `<svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">${ICON_PAUSE}</svg>`;
    reelLeft.classList.add('spin');
    reelRight.classList.add('spin');
    vinylDisc.classList.add('spin');
    tonearm.classList.add('playing');
  });
  audio.addEventListener('pause', ()=>{
    document.getElementById('playIcon').outerHTML = `<svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">${ICON_PLAY}</svg>`;
    reelLeft.classList.remove('spin');
    reelRight.classList.remove('spin');
    vinylDisc.classList.remove('spin');
    tonearm.classList.remove('playing');
  });

  audio.addEventListener('timeupdate', ()=>{
    if(isSeeking) return;
    const pct = audio.duration ? (audio.currentTime/audio.duration)*100 : 0;
    seek.value = pct;
    curTime.textContent = fmtTime(audio.currentTime);
    durTime.textContent = fmtTime(audio.duration);
  });
  audio.addEventListener('loadedmetadata', ()=>{ durTime.textContent = fmtTime(audio.duration); });

  let loopPlaylist = false;
  try{ loopPlaylist = localStorage.getItem('mixtape-loop-playlist') === 'true'; }catch(e){ /* default off */ }

  function nextPlayableIndex(fromIndex){
    let idx = fromIndex + 1;
    while(idx < tracks.length){
      if(tracks[idx].skipOnce){ tracks[idx].skipOnce = false; idx++; continue; }
      return idx;
    }
    if(loopPlaylist && tracks.length > 0){
      idx = 0;
      while(idx <= fromIndex){
        if(tracks[idx].skipOnce){ tracks[idx].skipOnce = false; idx++; continue; }
        return idx;
      }
    }
    return -1;
  }

  function prevPlayableIndex(fromIndex){
    let idx = fromIndex - 1;
    while(idx >= 0){
      if(tracks[idx].skipOnce){ tracks[idx].skipOnce = false; idx--; continue; }
      return idx;
    }
    if(loopPlaylist && tracks.length > 0){
      idx = tracks.length - 1;
      while(idx >= fromIndex){
        if(tracks[idx].skipOnce){ tracks[idx].skipOnce = false; idx--; continue; }
        return idx;
      }
    }
    return -1;
  }

  const loopToggleBtn = document.getElementById('loopToggleBtn');
  function setLoopPlaylist(on){
    loopPlaylist = on;
    loopToggleBtn.classList.toggle('on', on);
    try{ localStorage.setItem('mixtape-loop-playlist', on ? 'true' : 'false'); }catch(e){ /* preference just won't persist */ }
  }
  loopToggleBtn.addEventListener('click', ()=> setLoopPlaylist(!loopPlaylist));
  setLoopPlaylist(loopPlaylist);

  function shuffleTracks(){
    if(tracks.length < 2) return;
    const currentId = currentTrackIndex !== -1 ? tracks[currentTrackIndex].id : null;
    for(let i = tracks.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [tracks[i], tracks[j]] = [tracks[j], tracks[i]];
    }
    if(currentId){
      currentTrackIndex = tracks.findIndex(t => t.id === currentId);
    }
    renderPlaylist();
  }
  document.getElementById('mixBtn').addEventListener('click', shuffleTracks);

  function restoreOriginalOrder(){
    if(tracks.length < 2) return;
    const currentId = currentTrackIndex !== -1 ? tracks[currentTrackIndex].id : null;
    tracks.sort((a, b) => a.order - b.order);
    if(currentId){
      currentTrackIndex = tracks.findIndex(t => t.id === currentId);
    }
    renderPlaylist();
  }
  document.getElementById('restoreBtn').addEventListener('click', restoreOriginalOrder);

  // ---- Saved playlists (IndexedDB — stores the actual audio & cover files) ----
  const DB_NAME = 'mixtapeDB';
  const STORE_NAME = 'playlists';

  function openDB(){
    return new Promise((resolve, reject)=>{
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = (e)=>{
        const db = e.target.result;
        if(!db.objectStoreNames.contains(STORE_NAME)){
          db.createObjectStore(STORE_NAME, { keyPath: 'name' });
        }
      };
      req.onsuccess = ()=> resolve(req.result);
      req.onerror = ()=> reject(req.error);
    });
  }

  async function blobFromUrl(url){
    const res = await fetch(url);
    return await res.blob();
  }

  async function saveCurrentPlaylist(name){
    const db = await openDB();
    const trackRecords = [];
    for(const t of tracks){
      let audioBlob = null, remoteUrl = null;
      try{ audioBlob = await blobFromUrl(t.url); }
      catch(e){ remoteUrl = t.url; }
      let coverBlob = null, coverDataUrl = null, remoteCoverUrl = null;
      if(t.coverUrl){
        if(t.coverUrl.startsWith('data:')){ coverDataUrl = t.coverUrl; }
        else {
          try{ coverBlob = await blobFromUrl(t.coverUrl); }
          catch(e){ remoteCoverUrl = t.coverUrl; }
        }
      }
      trackRecords.push({ name: t.name, order: t.order, plays: t.plays, audioBlob, remoteUrl, coverBlob, coverDataUrl, remoteCoverUrl });
    }
    const record = { name, tracks: trackRecords, savedAt: Date.now() };
    await new Promise((resolve, reject)=>{
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(record);
      tx.oncomplete = resolve;
      tx.onerror = ()=> reject(tx.error);
    });
  }

  async function listSavedPlaylists(){
    const db = await openDB();
    return new Promise((resolve, reject)=>{
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).getAll();
      req.onsuccess = ()=> resolve(req.result || []);
      req.onerror = ()=> reject(req.error);
    });
  }

  async function deleteSavedPlaylist(name){
    const db = await openDB();
    await new Promise((resolve, reject)=>{
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).delete(name);
      tx.oncomplete = resolve;
      tx.onerror = ()=> reject(tx.error);
    });
  }

  async function loadSavedPlaylist(name){
    const db = await openDB();
    const record = await new Promise((resolve, reject)=>{
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(name);
      req.onsuccess = ()=> resolve(req.result);
      req.onerror = ()=> reject(req.error);
    });
    if(!record) return;
    audio.pause();
    audio.removeAttribute('src');
    tracks = [];
    currentTrackIndex = -1;
    currentPlayIndex = 0;
    expandedTrackId = null;
    record.tracks.slice().sort((a,b)=>a.order-b.order).forEach(rec=>{
      const url = rec.audioBlob ? URL.createObjectURL(rec.audioBlob) : rec.remoteUrl;
      const coverUrl = rec.coverDataUrl ? rec.coverDataUrl : (rec.coverBlob ? URL.createObjectURL(rec.coverBlob) : (rec.remoteCoverUrl || null));
      tracks.push({
        id: 't' + (idCounter++),
        order: rec.order,
        name: rec.name,
        url,
        plays: (rec.plays && rec.plays.length) ? rec.plays : [{ speed: 1 }],
        pendingSpeed: 1, pendingCount: 1, pendingCustomActive: false, pendingCustomValue: 2,
        coverUrl,
        skipOnce: false
      });
    });
    trackTitle.textContent = 'No track loaded';
    playStatus.textContent = tracks.length ? 'Select a track' : 'Load a file to begin';
    seek.value = 0; curTime.textContent = '0:00'; durTime.textContent = '0:00';
    renderPlaylist();
    renderDeckCover();
  }

  const savePlaylistBtn = document.getElementById('savePlaylistBtn');
  const loadPlaylistBtn = document.getElementById('loadPlaylistBtn');

  // ---- Jamendo browse & import (legally free/downloadable catalog) ----
  const JAMENDO_CLIENT_ID = '50d2c7fa';

  async function searchJamendo(query){
    const url = `https://api.jamendo.com/v3.0/tracks/?client_id=${JAMENDO_CLIENT_ID}&format=json&limit=24&search=${encodeURIComponent(query)}&include=musicinfo`;
    const res = await fetch(url);
    const data = await res.json();
    return (data.results || []).map(r => ({
      id: r.id,
      name: r.name,
      artist: r.artist_name,
      audioUrl: r.audio || r.audiodownload,
      artUrl: r.album_image || r.image || null
    }));
  }

  async function searchCcMixter(query){
    const res = await fetch(`/api/ccmixter?q=${encodeURIComponent(query)}`);
    const data = await res.json();
    const rows = Array.isArray(data) ? data : (data.results || data.rows || []);
    return rows.map(r => {
      const fileObj = (r.files && r.files[0]) || {};
      return {
        id: r.upload_id || r.id,
        name: r.upload_name || r.name || r.title || 'Untitled',
        artist: r.user_name || r.artist_name || r.artist || 'Unknown artist',
        audioUrl: r.file_url || r.download_url || fileObj.download_url || fileObj.url || r.sample_url,
        artUrl: r.art_url || r.art || r.image || null
      };
    }).filter(t => t.audioUrl);
  }

  async function searchArchive(query){
    const res = await fetch(`/api/archive?q=${encodeURIComponent(query)}`);
    const data = await res.json();
    return data.results || [];
  }

  async function searchFreesound(query){
    const res = await fetch(`/api/freesound?q=${encodeURIComponent(query)}`);
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    return (data.results || []).map(r => ({
      id: r.id,
      name: r.name,
      artist: r.username || 'Unknown artist',
      audioUrl: r.previews ? (r.previews['preview-hq-mp3'] || r.previews['preview-lq-mp3']) : null,
      artUrl: r.images ? (r.images.waveform_m || null) : null
    })).filter(t => t.audioUrl);
  }

  function addBrowsedTrack(t){
    const seq = idCounter++;
    tracks.push({
      id: 't' + seq,
      order: seq,
      name: `${t.artist} - ${t.name}`,
      url: t.audioUrl,
      plays: [{ speed: 1 }],
      pendingSpeed: 1, pendingCount: 1, pendingCustomActive: false, pendingCustomValue: 2,
      coverUrl: t.artUrl || null,
      skipOnce: false
    });
    renderPlaylist();
    if(currentTrackIndex === -1){ loadTrack(0, 0, false); }
  }

  let browseSource = 'jamendo';
  const BROWSE_SOURCES = [
    { id: 'jamendo', label: 'Jamendo' },
    { id: 'ccmixter', label: 'ccMixter' },
    { id: 'archive', label: 'Archive.org' },
    { id: 'freesound', label: 'Freesound' }
  ];

  document.getElementById('browseJamendoBtn').addEventListener('click', ()=>{
    editOverlayContainer.innerHTML = `
      <div class="edit-overlay" id="jamendoOverlayBackdrop">
        <div class="edit-panel" style="max-width:380px;">
          <div class="edit-panel-title">Browse free music</div>
          <div class="chip-row" id="browseSourceTabs" style="margin-bottom:12px; justify-content:center;">
            ${BROWSE_SOURCES.map(s => `<button class="setup-chip ${browseSource===s.id?'sel':''}" data-source="${s.id}">${s.label}</button>`).join('')}
          </div>
          <div class="jamendo-search-row">
            <input type="text" class="jamendo-search-input" id="jamendoSearchInput" placeholder="Search song or artist">
            <button class="jamendo-search-btn" id="jamendoSearchBtn">Go</button>
          </div>
          <div class="jamendo-results" id="jamendoResults"></div>
          <button class="edit-panel-close" id="jamendoOverlayClose">Close</button>
        </div>
      </div>
    `;
    document.getElementById('jamendoOverlayBackdrop').addEventListener('click', (e)=>{
      if(e.target.id === 'jamendoOverlayBackdrop') closeEditPopup();
    });
    document.getElementById('jamendoOverlayClose').addEventListener('click', closeEditPopup);

    const input = document.getElementById('jamendoSearchInput');
    const resultsEl = document.getElementById('jamendoResults');
    const tabsEl = document.getElementById('browseSourceTabs');

    tabsEl.querySelectorAll('[data-source]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        browseSource = btn.dataset.source;
        tabsEl.querySelectorAll('[data-source]').forEach(b => b.classList.toggle('sel', b.dataset.source === browseSource));
      });
    });

    const doSearch = async ()=>{
      const q = input.value.trim();
      if(!q) return;
      resultsEl.innerHTML = '<div class="saved-list-empty">Searching…</div>';
      try{
        let results;
        if(browseSource === 'ccmixter') results = await searchCcMixter(q);
        else if(browseSource === 'archive') results = await searchArchive(q);
        else if(browseSource === 'freesound') results = await searchFreesound(q);
        else results = await searchJamendo(q);

        if(results.length === 0){
          resultsEl.innerHTML = '<div class="saved-list-empty">No results found.</div>';
          return;
        }
        resultsEl.innerHTML = results.map(r => `
          <div class="saved-list-item">
            <div class="jamendo-result-left">
              <img class="jamendo-result-thumb" src="${r.artUrl || ''}" onerror="this.style.visibility='hidden'">
              <div>
                <div class="saved-list-name">${r.name}</div>
                <div class="saved-list-meta">${r.artist}</div>
              </div>
            </div>
            <button class="jamendo-add-btn" data-jaddid="${r.id}">+ Add</button>
          </div>
        `).join('');
        resultsEl.querySelectorAll('[data-jaddid]').forEach(btn=>{
          btn.addEventListener('click', ()=>{
            const track = results.find(r => String(r.id) === btn.dataset.jaddid);
            if(!track) return;
            addBrowsedTrack(track);
            btn.textContent = 'Added ✓';
            btn.disabled = true;
          });
        });
      }catch(err){
        resultsEl.innerHTML = '<div class="saved-list-empty">Something went wrong searching. Check your connection.</div>';
      }
    };
    document.getElementById('jamendoSearchBtn').addEventListener('click', doSearch);
    input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') doSearch(); });
    input.focus();
  });

  savePlaylistBtn.addEventListener('click', async ()=>{
    if(tracks.length === 0){ alert('Add some songs first, then save the playlist.'); return; }
    const name = window.prompt('Name this playlist:');
    if(!name) return;
    savePlaylistBtn.textContent = 'Saving…';
    try{
      await saveCurrentPlaylist(name.trim());
      savePlaylistBtn.textContent = '💾 Save playlist';
      alert(`Saved "${name.trim()}" — you can load it anytime from "📂 Load playlist".`);
    }catch(err){
      savePlaylistBtn.textContent = '💾 Save playlist';
      alert('Something went wrong saving this playlist. Your device storage might be full.');
    }
  });

  loadPlaylistBtn.addEventListener('click', async ()=>{
    let saved = [];
    try{ saved = await listSavedPlaylists(); }catch(e){ /* IndexedDB unavailable */ }
    const itemsHtml = saved.length
      ? saved.sort((a,b)=>b.savedAt-a.savedAt).map(p => `
          <div class="saved-list-item" data-loadname="${p.name}">
            <div>
              <div class="saved-list-name">${p.name}</div>
              <div class="saved-list-meta">${p.tracks.length} song${p.tracks.length===1?'':'s'} · ${new Date(p.savedAt).toLocaleDateString()}</div>
            </div>
            <button class="saved-list-delete" data-deletename="${p.name}">✕</button>
          </div>
        `).join('')
      : `<div class="saved-list-empty">No saved playlists yet.</div>`;

    editOverlayContainer.innerHTML = `
      <div class="edit-overlay" id="playlistOverlayBackdrop">
        <div class="edit-panel">
          <div class="edit-panel-title">Load a saved playlist</div>
          ${itemsHtml}
          <button class="edit-panel-close" id="playlistOverlayClose">Close</button>
        </div>
      </div>
    `;
    document.getElementById('playlistOverlayBackdrop').addEventListener('click', (e)=>{
      if(e.target.id === 'playlistOverlayBackdrop') closeEditPopup();
    });
    document.getElementById('playlistOverlayClose').addEventListener('click', closeEditPopup);
    editOverlayContainer.querySelectorAll('.saved-list-name, .saved-list-meta').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const name = el.closest('.saved-list-item').dataset.loadname;
        const ok = tracks.length === 0 || window.confirm('This will replace your current playlist. Continue?');
        if(!ok) return;
        closeEditPopup();
        await loadSavedPlaylist(name);
      });
    });
    editOverlayContainer.querySelectorAll('.saved-list-delete').forEach(el=>{
      el.addEventListener('click', async (e)=>{
        e.stopPropagation();
        const name = el.dataset.deletename;
        const ok = window.confirm(`Delete saved playlist "${name}"? This can't be undone.`);
        if(!ok) return;
        await deleteSavedPlaylist(name);
        loadPlaylistBtn.click();
      });
    });
  });

  audio.addEventListener('ended', ()=>{
    const t = currentTrack();
    if(!t) return;
    if(currentPlayIndex < t.plays.length - 1){
      // finish first (Option A) — this fires after natural end, so just advance to next queued play
      loadTrack(currentTrackIndex, currentPlayIndex + 1, true);
    } else {
      const nextIdx = nextPlayableIndex(currentTrackIndex);
      if(nextIdx !== -1) loadTrack(nextIdx, 0, true);
    }
  });

  seek.addEventListener('input', ()=>{ isSeeking = true; });
  seek.addEventListener('change', ()=>{
    if(audio.duration){ audio.currentTime = (seek.value/100) * audio.duration; }
    isSeeking = false;
  });

  prevBtn.addEventListener('click', ()=>{ const i = prevPlayableIndex(currentTrackIndex); if(i !== -1) loadTrack(i, 0, true); });
  nextBtn.addEventListener('click', ()=>{ const i = nextPlayableIndex(currentTrackIndex); if(i !== -1) loadTrack(i, 0, true); });

  // Live repeat: queues a new play right after the CURRENT play index, so it plays after this one finishes
  liveSpeedRow.querySelectorAll('.speed-chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      const t = currentTrack();
      if(!t) return;
      const speed = parseFloat(chip.dataset.speed);
      t.plays.splice(currentPlayIndex + 1, 0, { speed });
      renderPlaylist();
      updateStatus();
    });
  });

  document.getElementById('clearAllBtn').addEventListener('click', ()=>{
    if(tracks.length === 0) return;
    const ok = window.confirm('Clear all songs from this playlist? This can\'t be undone.');
    if(!ok) return;
    audio.pause();
    audio.removeAttribute('src');
    tracks = [];
    currentTrackIndex = -1;
    currentPlayIndex = 0;
    expandedTrackId = null;
    trackTitle.textContent = 'No track loaded';
    playStatus.textContent = 'Load a file to begin';
    seek.value = 0; curTime.textContent = '0:00'; durTime.textContent = '0:00';
    renderPlaylist();
    renderDeckCover();
  });

  renderDeckCover();

  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{ /* offline caching unavailable, app still works online */ });
    });
  }
</script>
</body>
</html>
